modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      valid_http_versions: [HTTP/1.1, HTTP/2.0]
      valid_status_codes: []  # defaults to 2xx
      follow_redirects: true
      preferred_ip_protocol: ip4
      fail_if_ssl: false
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false

  http_2xx_no_redirect:
    prober: http
    timeout: 10s
    http:
      method: GET
      follow_redirects: false
      preferred_ip_protocol: ip4
      fail_if_not_ssl: true

  dns_internal:
    prober: dns
    timeout: 5s
    dns:
      transport_protocol: udp
      preferred_ip_protocol: ip4
      query_name: dbh.fyi
      query_type: A
      # Resolved against the resolver in /etc/resolv.conf inside the container.
      # On Unraid this will be the host's resolver — point Unraid at the
      # internal Technitium servers to make this a meaningful split-horizon check.

  dns_public:
    prober: dns
    timeout: 5s
    dns:
      transport_protocol: udp
      preferred_ip_protocol: ip4
      query_name: davidhoeppner.ca
      query_type: A

  tcp_connect:
    prober: tcp
    timeout: 5s

  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4
