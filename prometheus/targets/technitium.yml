# Technitium DNS Prometheus metrics endpoint.
# Technitium 11.x+ exposes /metrics on its admin port (default 5380, http).
# If your install uses a different port or requires a token query param,
# edit `__metrics_path__` per-target.

- targets: ["100.64.0.11:5380"]
  labels:
    host: dns1
    location: hetzner

- targets: ["100.64.0.12:5380"]
  labels:
    host: dns2
    location: hetzner
