server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  # Reach the NAS over Tailscale. Replace with the NAS's Tailscale IP.
  - url: http://100.105.48.123:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 30s
      max_retries: 10

scrape_configs:
  - job_name: journal
    journal:
      max_age: 12h
      path: /var/log/journal
      labels:
        job: systemd-journal
        # `host` label is injected by the relabel below.
    relabel_configs:
      - source_labels: ["__journal__systemd_unit"]
        target_label: unit
      - source_labels: ["__journal__hostname"]
        target_label: host
      - source_labels: ["__journal_priority_keyword"]
        target_label: level

  # Technitium DNS server logs. Path is the default install location;
  # adjust if your install puts logs elsewhere.
  - job_name: technitium
    static_configs:
      - targets: [localhost]
        labels:
          job: technitium
          host: dsn1.dbh.fyi # dns1 or dns2
          __path__: /etc/dns/logs/*.log
    pipeline_stages:
      - regex:
          expression: '^\[(?P<timestamp>[^\]]+)\]\s+(?:\[(?P<remote>[^\]]+)\]\s+)?(?P<message>.*)$'
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05"
      - labels:
          remote:
