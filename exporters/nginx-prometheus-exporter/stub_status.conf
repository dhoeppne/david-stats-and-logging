# Drop this file into NPM's custom nginx config directory.
#
# For Nginx Proxy Manager (the standard jc21/nginx-proxy-manager image),
# global custom nginx snippets live under /data/nginx/custom/. The file
# `server_proxy.conf` is loaded inside the http {} block automatically.
#
# Path inside the NPM container: /data/nginx/custom/server_proxy.conf
# Path on the NPM host:          <npm-data-volume>/nginx/custom/server_proxy.conf
#
# After dropping this file, restart NPM:
#   docker compose -f /path/to/npm/docker-compose.yml restart app
#
# This exposes nginx stub_status on 127.0.0.1:8081/stub_status, which the
# nginx-prometheus-exporter sidecar scrapes.

server {
    listen 127.0.0.1:8081;
    server_name _;

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        return 404;
    }
}
